# Vertumnus CI — Test & Publish to crates.io
#
# Runs on tagged releases (v*.*.*) and on manual trigger.
# Tests run on all platforms, then publishes all workspace crates to crates.io.
# Set CARGO_REGISTRY_TOKEN in your repo secrets to enable publishing.

name: CI

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable
          components: clippy, rustfmt

      - name: Install nightly (for integration tests)
        run: rustup toolchain install nightly --force

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo check
        run: cargo check --workspace --all-targets

      - name: cargo test
        run: cargo test --workspace

      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: cargo fmt --check
        run: cargo fmt --check

  e2e:
    name: End-to-End (ubuntu-latest)
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Install nightly (for rustdoc JSON)
        run: rustup toolchain install nightly --force

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install maturin
        run: pip install maturin

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build Vertumnus
        run: cargo build --release

      - name: Run E2E — simple-math
        run: |
          ./target/release/vertumnus wrap tests/fixtures/simple-math \
            --out /tmp/vertumnus-e2e/simple-math \
            --package-name simple_math \
            --verbose

      - name: Test simple-math wheel
        run: |
          pip install /tmp/vertumnus-e2e/simple-math/target/wheels/*.whl
          python3 << 'EOF'
          import simple_math
          assert simple_math.add(2, 3) == 5
          assert simple_math.div(10.0, 2.0) == 5.0
          assert simple_math.div(10.0, 0.0) is None
          p = simple_math.Point(1.0, 2.0)
          assert abs(p.x - 1.0) < 1e-10
          assert p.distance(simple_math.Point(4.0, 6.0)) == 5.0
          d = simple_math.Direction.North
          assert d.offset() == (0, 1)
          import pytest
          try:
              simple_math.safe_div(1, 0)
              assert False, "Expected RuntimeError"
          except RuntimeError:
              pass
          print("simple-math E2E passed!")
          EOF

      - name: Run E2E — string-utils
        run: |
          ./target/release/vertumnus wrap tests/fixtures/string-utils \
            --out /tmp/vertumnus-e2e/string-utils \
            --package-name string_utils \
            --verbose

      - name: Test string-utils wheel
        run: |
          pip install /tmp/vertumnus-e2e/string-utils/target/wheels/*.whl
          python3 << 'EOF'
          import string_utils
          assert string_utils.reverse("hello") == "olleh"
          assert string_utils.word_count("hello world") == 2
          assert string_utils.is_palindrome("racecar") == True
          tp = string_utils.TextProcessor(">", True)
          result = tp.process("hello")
          assert result == ">HELLO", f"Expected >HELLO, got {result}"
          ps = string_utils.ProcessStatus.Success
          assert ps.is_ok() == True
          print("string-utils E2E passed!")
          EOF

  publish:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: [test, e2e]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: stable

      - name: Publish vertumnus-inspector
        run: cargo publish -p vertumnus-inspector --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish vertumnus-mapper
        run: cargo publish -p vertumnus-mapper --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish vertumnus-builder
        run: cargo publish -p vertumnus-builder --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish vertumnus-generator
        run: cargo publish -p vertumnus-generator --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

      - name: Publish vertumnus-cli
        run: cargo publish -p vertumnus-cli --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
